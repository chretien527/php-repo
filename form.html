<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Font Awesome 5 Free', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0d1117;
        }

        .form-container {
            background: #161b22;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            border: 1px solid #1f2937;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #c9d1d9;
            font-size: 32px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #6b8299;
            font-size: 14px;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        label {
            width: 110px;
            font-weight: 500;
            color: #8b949e;
            margin-right: 15px;
            font-size: 15px;
        }

        input[type="text"],
        input[type="password"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.3s, background 0.3s;
            background: #0d1117;
            color: #c9d1d9;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #4a8ccc;
            background: #1c2128;
        }

        .button-group {
            margin-top: 35px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #1f6feb;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media(min-width: 768px){
            label, input{
                width: 50%;
                padding: 10px;
                display: inline-block;
            }

        @media(max-width: 600px){
            label, input{
                width: 100%;
                display: inline-block;
            }
        }

        button:hover {
            background: #1a5dc8;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="subtitle">Welcome Back</div>
        <h2>Login</h2>
        <form>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="button-group">
                <button type="submit">Login</button>
            </div>
        </form>
    </div>
</body>
</html>
